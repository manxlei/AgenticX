appId: com.agenticx.desktop
productName: Near
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
extraResources:
  - assets/**/*
# afterSign: scripts/mac/notarize.js  # 公证在本地签名时启用；CI 无 Apple 证书时跳过
mac:
  artifactName: "${productName}-${version}-${arch}.${ext}"
  target:
    - target: dmg
  icon: assets/icon.icns
  category: public.app-category.developer-tools
  gatekeeperAssess: false
  extraResources:
    - from: bundled-backend/${arch}
      to: backend
      filter:
        - "**/*"
win:
  artifactName: "${productName}-${version}-win-x64.${ext}"
  target:
    - nsis
  icon: assets/icon.ico
  extraResources:
    - from: bundled-backend/win-amd64
      to: backend
      filter:
        - "**/*"
linux:
  target:
    - AppImage
