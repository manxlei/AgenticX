<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Machi</title>
    <script>
      try {
        var savedTheme = localStorage.getItem("agx-theme");
        document.documentElement.setAttribute(
          "data-theme",
          savedTheme === "light" ? "light" : "dark"
        );
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
