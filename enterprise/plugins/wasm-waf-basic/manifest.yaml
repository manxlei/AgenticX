name: wasm-waf-basic
version: "1.0.0"
type: plugin
runtime: wasm
enabled: false
priority: 10
scope:
  tenant_ids: ["*"]
  routes: ["/v1/*"]
wasm:
  binary: builtin:waf-basic
  host_capabilities: [audit_log, metrics_inc]
config:
  mode: block
  prompt_injection_keywords:
    - ignore previous instructions
    - disregard prior
    - system prompt override
