worker_processes auto;
events {
  worker_connections 4096;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # 基础限流（公网入口第一道保护）
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
  limit_conn_zone $binary_remote_addr zone=api_conn:10m;

  upstream gateway_backend {
    least_conn;
    server gateway-a:8088 max_fails=3 fail_timeout=10s;
    server gateway-b:8088 max_fails=3 fail_timeout=10s;
  }

  upstream web_portal_backend {
    server web-portal:3000;
  }

  upstream admin_console_backend {
    server admin-console:3001;
  }

  server {
    listen 80;
    server_name _;

    # 生产建议开启 TLS；此处保留 HTTP 入口用于内网/反向代理上游接入。
    location /healthz {
      proxy_pass http://gateway_backend/healthz;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /v1/ {
      limit_req zone=api_limit burst=60 nodelay;
      limit_conn api_conn 40;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
      proxy_pass http://gateway_backend;
    }

    location /api/chat/ {
      limit_req zone=api_limit burst=40 nodelay;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 600s;
      proxy_send_timeout 600s;
      proxy_pass http://gateway_backend;
    }

    location /admin/ {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://admin_console_backend/;
    }

    location / {
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_pass http://web_portal_backend/;
    }
  }
}
